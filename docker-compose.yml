services:

  # ── MySQL ────────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: rdam-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: rdam
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend Spring Boot ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdam-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/rdam?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP_CITIZEN: ${JWT_EXP_CITIZEN:-2592000000}
      JWT_EXP_OPERATOR: ${JWT_EXP_OPERATOR:-2592000000}
      STORAGE_PATH: /app/storage/certificados
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM:-noreply@pj.santafe.gov.ar}
      PLUSPAGOS_URL: ${PLUSPAGOS_URL:-http://host.docker.internal:3000}
      PLUSPAGOS_MERCHANT_GUID: ${PLUSPAGOS_MERCHANT_GUID:-test-merchant-001}
      PLUSPAGOS_SECRET_KEY: ${PLUSPAGOS_SECRET_KEY:-clave-secreta-campus-2026}
      PLUSPAGOS_CALLBACK_URL: ${PLUSPAGOS_CALLBACK_URL:-http://host.docker.internal:8080/api/v1/pagos/webhook}
      PLUSPAGOS_URL_SUCCESS: ${PLUSPAGOS_URL_SUCCESS:-http://localhost:5173/pago/exitoso}
      PLUSPAGOS_URL_ERROR: ${PLUSPAGOS_URL_ERROR:-http://localhost:5173/pago/error}
      PLUSPAGOS_MONTO: ${PLUSPAGOS_MONTO:-150000}
    volumes:
      - certificados_data:/app/storage/certificados
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  db_data:
  certificados_data:
