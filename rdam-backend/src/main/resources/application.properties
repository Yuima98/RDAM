spring.application.name=rdam-backend
spring.profiles.active=dev

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rdam?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4

spring.sql.init.mode=never

rdam.jwt.secret=${JWT_SECRET:cambia-este-secret-en-produccion-minimo-32-caracteres}
rdam.jwt.expiration-citizen-ms=${JWT_EXP_CITIZEN:86400000}
rdam.jwt.expiration-operator-ms=${JWT_EXP_OPERATOR:14400000}

rdam.storage.path=${STORAGE_PATH:./storage/certificados}

server.port=${PORT:8080}

# Logging — prod: INFO
logging.level.ar.gob.pj.rdam=INFO
logging.level.org.springframework.security=WARN

# PlusPagos
rdam.pluspagos.url=${PLUSPAGOS_URL:http://localhost:3000}
rdam.pluspagos.merchant-guid=${PLUSPAGOS_MERCHANT_GUID:test-merchant-001}
rdam.pluspagos.secret-key=${PLUSPAGOS_SECRET_KEY:clave-secreta-campus-2026}
rdam.pluspagos.callback-url=${PLUSPAGOS_CALLBACK_URL:http://localhost:8080/api/v1/pagos/webhook}
rdam.pluspagos.url-success=${PLUSPAGOS_URL_SUCCESS:http://localhost:5173/pago/exitoso}
rdam.pluspagos.url-error=${PLUSPAGOS_URL_ERROR:http://localhost:5173/pago/error}
rdam.pluspagos.monto-centavos=${PLUSPAGOS_MONTO:500000}

# SMTP
spring.mail.host=${MAIL_HOST:smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
rdam.mail.from=${MAIL_FROM:noreply@pj.santafe.gov.ar}

# Expiración solicitudes
rdam.expiracion.dias-pago=${EXPIRACION_DIAS_PAGO:60}

# Dev overrides — deshabilitados en prod
rdam.dev.skip-email=false

# Character encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# reCAPTCHA v2
rdam.recaptcha.enabled=true
rdam.recaptcha.site-key=${RECAPTCHA_SITE_KEY:6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI}
rdam.recaptcha.secret-key=${RECAPTCHA_SECRET_KEY:6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe}