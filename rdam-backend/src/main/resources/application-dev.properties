# ============================================================
# RDAM — Overrides para perfil DEV
# Se aplica sobre application.properties cuando spring.profiles.active=dev
# ============================================================

# JWT extendidos para testing (30 días)
rdam.jwt.expiration-citizen-ms=2592000000
rdam.jwt.expiration-operator-ms=2592000000

# Logging verbose
logging.level.ar.gob.pj.rdam=DEBUG
logging.level.org.springframework.security=INFO

# Timeout de pago reducido para testear job (15 días)
rdam.expiracion.dias-pago=15

# Deshabilitar envío de email OTP (el OTP se expone en el response)
rdam.dev.skip-email=true

# reCAPTCHA deshabilitado en dev (claves de test de Google incluidas en application.properties)
rdam.recaptcha.enabled=false